<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>six</title>
<link rel="stylesheet" href="/static/style.css">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>


<div class="topbar">
  <p class="six">six</p>
  <input type="search" placeholder="Search" class="search" onclick="search()">
  <i class='bx bx-search'></i>
  <div class="menu-icon" id="menuBtn">☰</div>
</div>

<!....Sidebar.....>
<div class="sidebar" id="sidebar">
  <a href="page1.html">Settings</a>
  <a href="page2.html">About</a>
  <a href="page3.html">Contact</a>
  <a href="page4.html">Logout</a>
  <p>© 2026 Six App</p>
</div>

<div class="overlay" id="overlay"></div>



<!-- AUTH MODAL -->
<div id="authBox" class="auth-box">

  <div class="content">
    <form onsubmit="login(); return false;">

      <button type="button" class="close-btn" onclick="closeAuth()">✕</button>

      <h2>Login</h2>

      <div class="input-box">
        <input type="text" id="username" placeholder="Username" required>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <div class="remember">
        <label>
          <input type="checkbox"> Remember me
        </label>
         <div class="forgot">
       <a href="#" class="forgot-pwd">Forgot Password?</a>
      </div>
     </div>

      <button type="submit" class="btnn">Login</button>
      
      <div class="register-link">
      <p>Don’t have an account?
      <a href="#" onclick="register()">Register</a>
      </p>
     </div>
    </form>
  </div>

</div>




<footer class="footer">

  <a href="{{ url_for('saved') }}" class="nav-item">
    <i class='bx bx-caret-down-square'></i>
    <span>Saved</span>
  </a>

  <a href="{{ url_for('wave') }}" class="nav-item">
    <i class='bx bx-bell'></i>
    <span>Wave</span>
  </a>

  <div class="addButton nav-item upload-btn" onclick="startUpload()">
    <i class='bx bx-plus'></i>
  </div>

  <a href="{{ url_for('earn') }}" class="nav-item">
    <i class='bx bx-wallet'></i>
    <span>Earn</span>
  </a>

  <a href="{{ url_for('profile') }}" class="nav-item">
    <i class='bx bx-user-circle'></i>
    <span>Profile</span>
  </a>

</footer>


<input type="file" id="fileInput" hidden>

<div id="feed" class="feed"></div>

<script src="/static/script.js"></script>
</body>
</html>
